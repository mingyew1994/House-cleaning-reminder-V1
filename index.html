<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CleanHome</title>
  <meta name="description" content="Smart mobile cleaning task manager with house layout editor." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=3" />
</head>
<body>
  <!-- ─── App Shell ─────────────────────────────────── -->
  <div id="app">

    <!-- Header -->
    <header id="app-header">
      <div id="header-left">
        <span id="app-logo">🏠</span>
        <span id="app-title">CleanHome</span>
      </div>
      <div id="header-right">
        <!-- Dynamic action buttons injected per mode -->
      </div>
    </header>

    <!-- ─── LAYOUT EDITOR VIEW ─────────────────────── -->
    <section id="view-layout" class="view active">
      <!-- Sub-toolbar (hidden until Edit mode is active) -->
      <div id="layout-toolbar" class="toolbar-hidden">
        <button class="tool-btn active" id="btn-tool-draw" title="Draw cells">✏️ Draw</button>
        <button class="tool-btn" id="btn-tool-merge" title="Merge rooms">🔗 Merge</button>
        <button class="tool-btn" id="btn-tool-erase" title="Erase cells">🗑️ Erase</button>
        <button class="tool-btn" id="btn-tool-label" title="Rename room">🏷️ Label</button>
      </div>

      <!-- Canvas wrapper -->
      <div id="canvas-wrap">
        <canvas id="floor-canvas"></canvas>
      </div>

      <!-- Floating action -->
      <div id="layout-fab-row">
        <button id="btn-edit-mode" class="fab-btn secondary">✏️ Edit Layout</button>
        <button id="btn-save-room" class="fab-btn primary" style="display:none">✔ Save Room</button>
        <button id="btn-clear-selection" class="fab-btn secondary" style="display:none">✖ Clear</button>
        <button id="btn-delete-room" class="fab-btn danger" style="display:none">🗑 Delete Room</button>
      </div>

      <!-- Room list chips -->
      <div id="room-chips"></div>
    </section>

    <!-- ─── TASKS VIEW ─────────────────────────────── -->
    <section id="view-tasks" class="view">
      <p id="tasks-hint" class="hint-text">Tap a room on the map to add or view its tasks.</p>
      <div id="tasks-canvas-wrap">
        <canvas id="tasks-canvas"></canvas>
      </div>
      <div id="tasks-list-wrap">
        <div id="tasks-room-title"></div>
        <div id="tasks-list"></div>
        <button id="btn-add-task" class="fab-btn primary" style="display:none">＋ Add Task</button>
      </div>
    </section>

    <!-- ─── CLEAN NOW VIEW ──────────────────────────── -->
    <section id="view-clean" class="view">
      <div id="clean-header-card">
        <h2>What can I clean?</h2>
        <p>Enter your available time. Only tasks that need attention (past 50% of their schedule) will be suggested.</p>
        <div id="time-input-row">
          <div id="time-slider-wrap">
            <div id="time-slider-label"><span id="time-val-display">30 mins</span></div>
            <input type="range" id="avail-time" min="5" max="240" step="5" value="30" />
          </div>
          <button id="btn-go-clean" class="fab-btn primary">Go ▶</button>
        </div>
      </div>
      <div id="clean-results"></div>
    </section>

    <!-- ─── PROGRESS VIEW ────────────────────────────── -->
    <section id="view-progress" class="view">
      <div id="progress-hero">
        <div id="progress-ring-wrap">
          <svg id="progress-ring" viewBox="0 0 120 120">
            <circle id="ring-bg"  cx="60" cy="60" r="50" />
            <circle id="ring-fill" cx="60" cy="60" r="50" />
          </svg>
          <div id="progress-ring-label">
            <span id="progress-pct">0%</span>
            <span id="progress-ring-sub">on track</span>
          </div>
        </div>
        <div id="progress-hero-text">
          <div id="progress-motivation"></div>
          <div id="progress-stats-row"></div>
        </div>
      </div>

      <div id="progress-activity">
        <h3>Activity</h3>
        <div id="heatmap-outer"></div>
      </div>

      <div id="progress-rooms"></div>
    </section>

    <!-- ─── BOTTOM NAV ─────────────────────────────── -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-view="layout" id="nav-layout">
        <span class="nav-icon">🗺️</span>
        <span class="nav-label">Layout</span>
      </button>
      <button class="nav-btn" data-view="tasks" id="nav-tasks">
        <span class="nav-icon">✅</span>
        <span class="nav-label">Tasks</span>
      </button>
      <button class="nav-btn" data-view="clean" id="nav-clean">
        <span class="nav-icon">⚡</span>
        <span class="nav-label">Clean Now</span>
      </button>
      <button class="nav-btn" data-view="progress" id="nav-progress">
        <span class="nav-icon">🏆</span>
        <span class="nav-label">Progress</span>
      </button>
    </nav>
  </div>

  <!-- ─── MODALS ─────────────────────────────────────── -->

  <!-- Room Name Modal -->
  <div id="modal-room-name" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <h3>Name this Room</h3>
      <input type="text" id="input-room-name" placeholder="e.g. Living Room" maxlength="30" />
      <div class="modal-color-row" id="room-color-picker"></div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="btn-room-name-cancel">Cancel</button>
        <button class="modal-btn primary" id="btn-room-name-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Task Modal -->
  <div id="modal-task" class="modal-overlay" style="display:none">
    <div class="modal-card tall">
      <h3 id="modal-task-title">New Task</h3>
      <label>Task Name</label>
      <input type="text" id="task-name" placeholder="e.g. Vacuum carpet" maxlength="60" />
      <label>Time to clean (minutes)</label>
      <input type="number" id="task-duration" min="1" max="300" placeholder="15" />
      <label>Clean every (days)</label>
      <input type="number" id="task-interval" min="1" max="365" placeholder="7" />
      <label>Photo (optional)</label>
      <div id="photo-preview-wrap">
        <img id="task-photo-preview" src="" alt="" style="display:none" />
        <label id="photo-upload-btn" for="task-photo-input">📷 Add Photo</label>
        <input type="file" id="task-photo-input" accept="image/*" capture="environment" style="display:none" />
      </div>
      <div class="modal-actions">
        <button class="modal-btn secondary" id="btn-task-cancel">Cancel</button>
        <button class="modal-btn danger" id="btn-task-delete" style="display:none">Delete</button>
        <button class="modal-btn primary" id="btn-task-save">Save</button>
      </div>
    </div>
  </div>

  <!-- Alert / Confirm Modal -->
  <div id="modal-alert" class="modal-overlay" style="display:none">
    <div class="modal-card">
      <p id="modal-alert-msg"></p>
      <div class="modal-actions">
        <button class="modal-btn primary" id="btn-alert-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Photo Lightbox -->
  <div id="modal-photo" style="display:none">
    <img id="modal-photo-img" src="" alt="Task photo" />
    <button id="modal-photo-close">✕</button>
  </div>

  <script src="app.js?v=3"></script>
</body>
</html>
